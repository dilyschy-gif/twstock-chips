name: 建立股票資料庫（上市+上櫃）

on:
  schedule:
    # 每週一台灣時間 08:00（UTC 00:00）執行一次
    # 公司清單不會每天變動，週更即可；改版/上市新股當天可手動觸發
    - cron: '0 0 * * 1'

  workflow_dispatch:  # 保留手動觸發按鈕

jobs:
  build-stock-database:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install requests gspread google-auth

      - name: 執行股票資料庫建立
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python fetch_stock_database.py
