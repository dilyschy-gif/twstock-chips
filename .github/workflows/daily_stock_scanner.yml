name: Daily Taiwan Stock Scanner

on:
  schedule:
    # 主排程 09:00 UTC = 台北 17:00（每天）。
    # GitHub 排程事件偶爾會延遲或被丟棄，尤其整點附近；保留 17:00
    # 作為正常啟動時間，並加入 17:07 / 17:20 / 17:50 補償排程。
    # 主掃描為整表覆寫，重複執行無害（下游逆勢掃描與 data.json 匯出
    # 透過 workflow_run 跟隨，也會自動重跑，同樣無害）。
    # 必須晚於籌碼更新（16:35 / 備援 16:55）。
    - cron: '0 9 * * *'
    - cron: '7 9 * * *'
    - cron: '20 9 * * *'
    - cron: '50 9 * * *'
  workflow_dispatch:

jobs:
  run-main-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth

      - name: Test V-reversal rules
        run: python -m unittest discover -v

      - name: Run main stock scanner
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python main_stock_scanner.py
