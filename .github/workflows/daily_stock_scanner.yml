name: Daily Taiwan Stock Scanner

on:
  schedule:
    # 主排程 09:05 UTC = 台北 17:05（週一至五）。
    # 原本的 17:00 正好是整點，是 GitHub 官方文件所述排程最容易被延遲/丟棄的
    # 高負載時段，故挪後 5 分鐘避開。
    # 備援排程 09:50 UTC = 台北 17:50：主排程被丟棄時補跑；
    # 主掃描為整表覆寫，重複執行無害（下游逆勢掃描與 data.json 匯出
    # 透過 workflow_run 跟隨，也會自動重跑，同樣無害）。
    # 必須晚於籌碼更新（16:35 / 備援 16:55）。
    - cron: '5 9 * * 1-5'
    - cron: '50 9 * * 1-5'
  workflow_dispatch:

jobs:
  run-main-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth

      - name: Run main stock scanner
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python main_stock_scanner.py
