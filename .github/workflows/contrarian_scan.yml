name: 逆勢抗跌標的掃描

on:
  workflow_run:
    workflows: ["Daily Taiwan Stock Scanner"]
    types: [completed]
  workflow_dispatch:
  push:
    paths:
      - contrarian-refresh-trigger.txt

jobs:
  fetch-contrarian:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # workflow_run 觸發時,只在主掃描「成功」才跑;手動/推檔觸發不受限
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install requests gspread google-auth

      - name: 執行逆勢抗跌掃描
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python fetch_contrarian.py
