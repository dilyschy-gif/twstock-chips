name: 逆勢抗跌標的掃描

on:
  schedule:
    # 18:20 Asia/Taipei, Monday-Friday.
    - cron: '20 10 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-contrarian:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install requests gspread google-auth

      - name: 執行逆勢抗跌掃描
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python fetch_contrarian.py
