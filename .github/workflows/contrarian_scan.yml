name: 逆勢抗跌標的掃描

on:
  schedule:
      # 台灣時間 18:30（UTC 10:30）
          # 在籌碼更新（18:00）、爆量偵測（18:10）、美股更新（18:20）之後執行
              # 確保所有基礎數據已寫入 Sheets
                  - cron: '30 10 * * 1-5'
                    workflow_dispatch:  # 手動觸發，方便測試

                    jobs:
                      fetch-contrarian:
                          runs-on: ubuntu-latest
                              timeout-minutes: 30  # 需要逐檔查詢 Yahoo Finance，給較長時間

                                  steps:
                                        - name: 下載程式碼
                                                uses: actions/checkout@v4

                                                      - name: 設定 Python 環境
                                                              uses: actions/setup-python@v5
                                                                      with:
                                                                                python-version: '3.11'

                                                                                      - name: 安裝套件
                                                                                              run: |
                                                                                                        pip install requests gspread google-auth
                                                                                                        
                                                                                                              - name: 執行逆勢抗跌掃描
                                                                                                                      env:
                                                                                                                                GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
                                                                                                                                          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
                                                                                                                                                  run: |
                                                                                                                                                            python fetch_contrarian.py
