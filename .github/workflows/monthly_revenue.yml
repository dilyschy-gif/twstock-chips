name: 每月台股營收資料更新

on:
  schedule:
    # 每月 11 日台灣時間 09:00（UTC 01:00），月營收約 10 日後公布完整
    - cron: '0 1 11 * *'

  # 允許手動觸發（方便測試或補抓）
  workflow_dispatch:

jobs:
  fetch-revenue:
    runs-on: ubuntu-latest
    # 月營收要抓近 2000 檔，給足夠時間（GitHub Actions 單個 job 上限 6 小時）
    timeout-minutes: 60

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install requests gspread google-auth

      - name: 執行月營收資料抓取
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python fetch_revenue.py
