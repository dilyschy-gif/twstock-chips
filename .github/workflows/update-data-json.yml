name: Update Cloudflare Pages data

on:
  workflow_dispatch:
    inputs:
      run_main_scan:
        description: "Run main_stock_scanner.py before exporting data.json (manual runs only)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    paths:
      - data-refresh-trigger.txt
  workflow_run:
    workflows: ["Daily Taiwan Stock Scanner", "逆勢抗跌標的掃描"]
    types: [completed]
  schedule:
    # 11:00 UTC = 19:00 Asia/Taipei safety net, Monday-Friday.
    # Only matters if the workflow_run chain breaks; commits nothing if data unchanged.
    - cron: "0 11 * * 1-5"

permissions:
  contents: write

jobs:
  update-data-json:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth requests

      - name: Run main stock scanner for manual full refresh
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_main_scan == 'true' }}
        run: python main_stock_scanner.py

      - name: Export Google Sheet results to data.json
        run: python export_sheet_to_data_json.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data.json changes to commit."
          else
            git commit -m "Update frontend data from Google Sheet"
            git push
          fi
