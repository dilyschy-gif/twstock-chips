name: 每日美股連動資料更新

on:
  schedule:
    # 台灣時間 16:30（UTC 08:30）
    # 美股資料本質為「前一天收盤價」，抓取時間點不影響資料新鮮度，
    # 改到傍晚與台股排程統一管理，且晚於 GAS 15:20 寄信時間，避免互相干擾
    - cron: '30 8 * * *'

  workflow_dispatch:

jobs:
  fetch-us-market:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install requests gspread google-auth

      - name: 執行美股連動資料抓取
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python fetch_us_market.py
