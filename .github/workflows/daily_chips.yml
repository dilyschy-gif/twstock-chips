name: 每日台股籌碼資料更新

on:
  schedule:
    # 台灣時間 18:00（UTC+8），換算為 UTC 10:00
    # 給籌碼數據充足沉澱時間（收盤16:30→完整確認→18:00抓取）
    # 每週一到週五執行
    - cron: '0 10 * * 1-5'

  workflow_dispatch:

jobs:
  fetch-chips:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install requests gspread google-auth

      - name: 執行籌碼資料抓取
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python fetch_chips.py
