name: 每日台股籌碼資料更新

on:
  schedule:
    # 08:35 UTC = 16:35 Asia/Taipei, Monday-Friday.
    # Must finish before Daily Taiwan Stock Scanner at 17:00.
    - cron: '35 8 * * 1-5'

  workflow_dispatch:

jobs:
  fetch-chips:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install requests gspread google-auth

      - name: 執行籌碼資料抓取
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python fetch_chips.py
