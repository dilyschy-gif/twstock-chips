name: 每日台股籌碼資料更新

on:
  schedule:
    # 主排程 08:35 UTC = 台北 16:35（週一至五）。
    # 備援排程 08:55 UTC = 台北 16:55：GitHub 高負載時排程可能被丟棄，
    # 若主排程未觸發由備援補跑；fetch_chips.py 內建同日期去重，重複執行無害。
    # 兩者都必須早於主掃描（17:00）。
    - cron: '35 8 * * 1-5'
    - cron: '55 8 * * 1-5'

  workflow_dispatch:

jobs:
  fetch-chips:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: |
          pip install requests gspread google-auth

      - name: 執行籌碼資料抓取
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python fetch_chips.py
